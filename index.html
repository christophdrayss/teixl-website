<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEIXL Investments</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    footer {
      padding: 20px;
      text-align: center;
      font-size: 11px;
      color: #b0b0b0;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <main>
    <canvas id="bg"></canvas>
  </main>
  <footer>TEIXL Investments GmbH, Ebereschenallee 16, D-14050 Berlin, Geschäftsführer: Alexander Kudlich</footer>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
      w = canvas.width = canvas.offsetWidth * devicePixelRatio;
      h = canvas.height = canvas.offsetHeight * devicePixelRatio;
    }
    resize();
    window.addEventListener('resize', resize);

    const blobs = [
      { speed: 0.00025, offset: 0,   r: 140, g: 100, b: 200 },
      { speed: 0.00018, offset: 2.0, r: 170, g: 120, b: 225 },
      { speed: 0.00030, offset: 4.0, r: 125, g: 85,  b: 190 },
    ];

    function draw(t) {
      ctx.clearRect(0, 0, w, h);
      const cx = w / 2;
      const cy = h / 2;

      for (const b of blobs) {
        const phase = t * b.speed + b.offset;
        const ox = Math.sin(phase) * w * 0.15;
        const oy = Math.cos(phase * 0.7) * h * 0.12;
        const r = Math.max(w, h) * 0.38;
        const grad = ctx.createRadialGradient(cx + ox, cy + oy, 0, cx + ox, cy + oy, r);
        grad.addColorStop(0, `rgba(${b.r},${b.g},${b.b}, 0.25)`);
        grad.addColorStop(0.4, `rgba(${b.r},${b.g},${b.b}, 0.10)`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
      }

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
